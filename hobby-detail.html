<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StartHobby — Hobby Detail</title>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Theme Definitions -->
  <script src="themes.js"></script>
  <script>
    (function() {
      var stored = null;
      try { stored = JSON.parse(localStorage.getItem('sh_theme')); } catch(e) {}
      var validIds = THEMES.filter(function(t) { return t && t.id && t.colorMap; }).map(function(t) { return t.id; });
      var themeId;
      if (stored && validIds.indexOf(stored) !== -1) {
        themeId = stored;
      } else {
        if (stored !== null) { try { localStorage.removeItem('sh_theme'); } catch(e) {} }
        themeId = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
      }
      document.documentElement.setAttribute('data-theme', themeId);
      var theme = THEMES.find(function(t) { return t.id === themeId; });
      if (theme && theme.colorMap) {
        Object.keys(theme.colorMap).forEach(function(key) {
          document.documentElement.style.setProperty('--theme-' + key, theme.colorMap[key]);
        });
      }
    })();
  </script>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif']
          },
          colors: {
            brand: {
              primary: 'var(--theme-brand-primary, #6366f1)',
              secondary: 'var(--theme-brand-secondary, #10b981)'
            },
            surface: 'var(--theme-surface, #f9fafb)',
            'th-bg': 'var(--theme-background, #ffffff)',
            'th-text': 'var(--theme-text-primary, #111827)',
            'th-text-secondary': 'var(--theme-text-secondary, #6b7280)',
            'th-border': 'var(--theme-border, #e5e7eb)'
          }
        }
      }
    }
  </script>

  <!-- Theme Engine -->
  <script src="theme-engine.js"></script>

  <!-- Alpine.js CDN -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    *:focus-visible {
      outline: 2px solid var(--theme-brand-primary, #6366f1);
      outline-offset: 2px;
    }
    /* Theme switcher option focus indicator */
    [role="radiogroup"] [role="radio"]:focus {
      outline: 2px solid var(--theme-brand-primary, #6366f1);
      outline-offset: 2px;
    }
    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="font-sans bg-th-bg text-th-text antialiased" x-data="hobbyDetailPage()" x-cloak>
  <!-- Auth check: prevent flash of content for unauthenticated users -->
  <script>
    document.body.style.visibility = 'hidden';
    try {
      if (JSON.parse(localStorage.getItem('authState')) === 'authenticated') {
        document.body.style.visibility = 'visible';
      } else {
        window.location.replace('index.html');
      }
    } catch(e) {
      window.location.replace('index.html');
    }
  </script>

  <!-- ─── Navigation Bar ──────────────────────────────────────────────────── -->
  <nav x-data="{ mobileOpen: false }" class="sticky top-0 z-40 bg-surface border-b border-th-border shadow-sm">
    <div class="max-w-[1280px] mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <!-- Logo -->
        <a href="index.html" class="flex items-center gap-2 text-brand-primary font-bold text-xl" aria-label="StartHobby Home">
          <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
          </svg>
          <span>StartHobby</span>
        </a>

        <!-- Desktop Navigation Links -->
        <div class="hidden md:flex items-center gap-6">
          <a href="index.html" class="text-th-text-secondary hover:text-brand-primary transition-colors">Home</a>
          <a href="discovery.html" class="text-th-text-secondary hover:text-brand-primary transition-colors">Discover</a>
          <a href="my-plan.html" class="text-th-text-secondary hover:text-brand-primary transition-colors">My Plan</a>
          <a href="progress.html" class="text-th-text-secondary hover:text-brand-primary transition-colors">Progress</a>
          <a href="avatar.html" class="text-th-text-secondary hover:text-brand-primary transition-colors">Avatar</a>
          <a href="about.html" class="text-th-text-secondary hover:text-brand-primary transition-colors">About</a>
        </div>

        <!-- Theme Switcher -->
        <div x-data="themeSwitcher()" @click.away="close()" class="relative hidden md:block">
          <button
            @click="toggle()"
            class="relative p-2 rounded-lg text-th-text-secondary hover:text-brand-primary hover:bg-gray-100 transition-colors group"
            aria-label="Change theme"
          >
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"/>
            </svg>
            <!-- Tooltip -->
            <span class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 px-2 py-1 text-xs font-medium text-white bg-gray-900 rounded whitespace-nowrap opacity-0 group-hover:opacity-100 group-focus:opacity-100 transition-opacity pointer-events-none">
              Change theme
            </span>
          </button>

          <!-- Theme Selection Panel -->
          <div
            x-show="open"
            x-transition:enter="transition ease-out duration-150"
            x-transition:enter-start="opacity-0 scale-95"
            x-transition:enter-end="opacity-100 scale-100"
            x-transition:leave="transition ease-in duration-100"
            x-transition:leave-start="opacity-100 scale-100"
            x-transition:leave-end="opacity-0 scale-95"
            x-cloak
            class="absolute right-0 mt-2 w-48 bg-white border border-gray-200 rounded-xl shadow-lg p-2 z-50"
            role="radiogroup"
            aria-label="Theme selection"
            @keydown="handleKeydown($event)"
          >
            <template x-for="(theme, index) in themes" :key="theme.id">
              <button
                role="radio"
                :aria-checked="theme.id === activeTheme ? 'true' : 'false'"
                :tabindex="index === focusedIndex ? '0' : '-1'"
                @click="select(theme.id); focusedIndex = index"
                @focus="focusedIndex = index"
                class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-left transition-colors hover:bg-surface"
                :class="theme.id === activeTheme ? 'ring-2 ring-brand-primary bg-gray-50' : ''"
                :style="'outline-offset: 2px;'"
                x-ref="themeOption"
              >
                <!-- Color Preview Swatch -->
                <span
                  class="w-5 h-5 rounded-full border border-th-border flex-shrink-0"
                  :style="'background: linear-gradient(135deg, ' + theme.colorMap.background + ' 50%, ' + theme.colorMap['brand-primary'] + ' 50%);'"
                  aria-hidden="true"
                ></span>
                <!-- Theme Name -->
                <span class="flex-1 font-medium text-gray-700" x-text="theme.name"></span>
                <!-- Active Indicator (Checkmark) -->
                <svg x-show="theme.id === activeTheme" class="w-4 h-4 text-brand-primary flex-shrink-0" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true">
                  <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
                </svg>
              </button>
            </template>
          </div>
        </div>

        <!-- Right: CTA + Coin Counter + Saved Count -->
        <div class="flex items-center gap-3">
          <!-- Saved Count Badge -->
          <div x-show="savedCount > 0" class="flex items-center gap-1 bg-pink-50 text-pink-600 px-3 py-1.5 rounded-full text-sm font-medium" aria-label="Saved hobbies count">
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true"><path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd"/></svg>
            <span x-text="savedCount"></span>
          </div>

          <!-- Coin Counter -->
          <div class="flex items-center gap-1 bg-amber-50 text-amber-700 px-3 py-1.5 rounded-full text-sm font-medium" aria-label="Coin balance">
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true"><circle cx="10" cy="10" r="8" fill="#f59e0b"/><text x="10" y="14" text-anchor="middle" font-size="10" fill="white" font-weight="bold">$</text></svg>
            <span x-text="coins"></span>
          </div>

          <!-- Start Now CTA (desktop) -->
          <a href="onboarding.html" class="hidden md:inline-flex items-center px-4 py-2 bg-brand-primary text-white font-medium rounded-lg hover:bg-brand-primary/90 transition-colors text-sm">
            Start Now
          </a>

          <!-- Logout Button (shown only when authenticated) -->
          <button
            id="logout-btn"
            onclick="handleLogout()"
            class="text-th-text-secondary hover:text-red-600 transition-colors p-2 rounded-lg hover:bg-red-50"
            aria-label="Logout"
            style="display: none;"
          >
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
            </svg>
          </button>

          <!-- Mobile Hamburger Menu -->
          <button
            @click="mobileOpen = !mobileOpen"
            class="md:hidden p-2 rounded-lg text-th-text-secondary hover:bg-gray-100 transition-colors"
            :aria-expanded="mobileOpen"
            aria-label="Toggle navigation menu"
          >
            <svg x-show="!mobileOpen" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
            <svg x-show="mobileOpen" x-cloak class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Mobile Menu Dropdown -->
      <div x-show="mobileOpen" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 -translate-y-2" x-transition:enter-end="opacity-100 translate-y-0" x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100 translate-y-0" x-transition:leave-end="opacity-0 -translate-y-2" x-cloak class="md:hidden border-t border-th-border py-3">
        <div class="flex flex-col gap-2">
          <a href="index.html" class="px-3 py-2 rounded-lg text-th-text-secondary hover:bg-surface">Home</a>
          <a href="discovery.html" class="px-3 py-2 rounded-lg text-th-text-secondary hover:bg-surface">Discover</a>
          <a href="my-plan.html" class="px-3 py-2 rounded-lg text-th-text-secondary hover:bg-surface">My Plan</a>
          <a href="progress.html" class="px-3 py-2 rounded-lg text-th-text-secondary hover:bg-surface">Progress</a>
          <a href="avatar.html" class="px-3 py-2 rounded-lg text-th-text-secondary hover:bg-surface">Avatar</a>
          <a href="about.html" class="px-3 py-2 rounded-lg text-th-text-secondary hover:bg-surface">About</a>
          <a href="onboarding.html" class="mt-2 px-3 py-2 rounded-lg bg-brand-primary text-white font-medium text-center">Start Now</a>

          <!-- Mobile Theme Switcher -->
          <div x-data="themeSwitcher()" class="mt-3 pt-3 border-t border-gray-100">
            <button
              @click="toggle()"
              class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-th-text-secondary hover:bg-surface transition-colors"
              aria-label="Change theme"
            >
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"/>
              </svg>
              <span class="flex-1 text-left text-sm font-medium">Change theme</span>
              <svg class="w-4 h-4 transition-transform" :class="open ? 'rotate-180' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
              </svg>
            </button>

            <div
              x-show="open"
              x-transition:enter="transition ease-out duration-150"
              x-transition:enter-start="opacity-0 -translate-y-1"
              x-transition:enter-end="opacity-100 translate-y-0"
              x-transition:leave="transition ease-in duration-100"
              x-transition:leave-start="opacity-100 translate-y-0"
              x-transition:leave-end="opacity-0 -translate-y-1"
              x-cloak
              class="mt-1 ml-8 flex flex-col gap-1"
              role="radiogroup"
              aria-label="Theme selection"
              @keydown="handleKeydown($event)"
            >
              <template x-for="(theme, index) in themes" :key="theme.id">
                <button
                  role="radio"
                  :aria-checked="theme.id === activeTheme ? 'true' : 'false'"
                  :tabindex="index === focusedIndex ? '0' : '-1'"
                  @click="select(theme.id); focusedIndex = index"
                  @focus="focusedIndex = index"
                  class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-left transition-colors hover:bg-surface"
                  :class="theme.id === activeTheme ? 'ring-2 ring-brand-primary bg-gray-50' : ''"
                  :style="'outline-offset: 2px;'"
                >
                  <span
                    class="w-5 h-5 rounded-full border border-th-border flex-shrink-0"
                    :style="'background: linear-gradient(135deg, ' + theme.colorMap.background + ' 50%, ' + theme.colorMap['brand-primary'] + ' 50%);'"
                    aria-hidden="true"
                  ></span>
                  <span class="flex-1 font-medium text-gray-700" x-text="theme.name"></span>
                  <svg x-show="theme.id === activeTheme" class="w-4 h-4 text-brand-primary flex-shrink-0" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true">
                    <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
                  </svg>
                </button>
              </template>
            </div>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- ─── Main Content ────────────────────────────────────────────────────── -->
  <main class="max-w-[1280px] mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="flex flex-col lg:flex-row gap-8">

      <!-- ─── Content Column ──────────────────────────────────────────────── -->
      <div class="flex-1 min-w-0">

        <!-- Header Section -->
        <div class="bg-surface rounded-xl border border-th-border p-6 mb-6">
          <div class="flex flex-col sm:flex-row items-start gap-5">
            <!-- Hobby Illustration -->
            <div class="w-16 h-16 rounded-xl bg-brand-primary/20 flex items-center justify-center text-brand-primary font-bold text-2xl flex-shrink-0" aria-hidden="true">
              <span x-text="hobby ? hobby.name.charAt(0) : ''"></span>
            </div>
            <div class="flex-1">
              <h1 class="text-2xl sm:text-3xl font-bold text-th-text" x-text="hobby ? hobby.name : ''"></h1>
              <div class="mt-2 flex flex-wrap items-center gap-2">
                <!-- Category -->
                <span class="px-3 py-1 rounded-full text-xs font-medium bg-gray-100 text-th-text" x-text="hobby ? hobby.category : ''"></span>
                <!-- Difficulty Badge -->
                <span
                  class="px-3 py-1 rounded-full text-xs font-medium capitalize"
                  :class="{
                    'bg-green-100 text-green-700': hobby && hobby.difficulty === 'beginner',
                    'bg-amber-100 text-amber-700': hobby && hobby.difficulty === 'intermediate',
                    'bg-red-100 text-red-700': hobby && hobby.difficulty === 'advanced'
                  }"
                  x-text="hobby ? hobby.difficulty : ''"
                ></span>
                <!-- Cost Badge -->
                <span class="px-3 py-1 rounded-full text-xs font-medium bg-blue-100 text-blue-700" x-text="hobby ? getCostLabel(hobby) : ''"></span>
              </div>
              <p class="mt-3 text-th-text-secondary text-sm leading-relaxed" x-text="hobby ? hobby.description : ''"></p>
            </div>
          </div>
        </div>

        <!-- Quick Stats Row -->
        <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3 mb-6">
          <div class="bg-surface rounded-xl border border-th-border p-4 text-center">
            <div class="text-xs text-th-text-secondary mb-1">First Win</div>
            <div class="font-semibold text-th-text text-sm" x-text="hobby ? hobby.timeToFirstWin : ''"></div>
          </div>
          <div class="bg-surface rounded-xl border border-th-border p-4 text-center">
            <div class="text-xs text-th-text-secondary mb-1">Weekly Time</div>
            <div class="font-semibold text-th-text text-sm" x-text="hobby ? hobby.timePerWeek.min + '–' + hobby.timePerWeek.max + ' hrs' : ''"></div>
          </div>
          <div class="bg-surface rounded-xl border border-th-border p-4 text-center">
            <div class="text-xs text-th-text-secondary mb-1">Starter Cost</div>
            <div class="font-semibold text-th-text text-sm" x-text="hobby ? getCostLabel(hobby) : ''"></div>
          </div>
          <div class="bg-surface rounded-xl border border-th-border p-4 text-center">
            <div class="text-xs text-th-text-secondary mb-1">Environment</div>
            <div class="font-semibold text-th-text text-sm capitalize" x-text="hobby ? hobby.environment : ''"></div>
          </div>
          <div class="bg-surface rounded-xl border border-th-border p-4 text-center">
            <div class="text-xs text-th-text-secondary mb-1">Social</div>
            <div class="font-semibold text-th-text text-sm capitalize" x-text="hobby ? hobby.social : ''"></div>
          </div>
        </div>

        <!-- Equipment List -->
        <div class="bg-surface rounded-xl border border-th-border p-6 mb-6">
          <h2 class="text-lg font-semibold text-th-text mb-4">Equipment Needed</h2>
          <div class="space-y-3">
            <template x-for="eq in (hobby ? hobby.equipment : [])" :key="eq.item">
              <div class="flex items-start gap-3 p-3 rounded-lg" :class="exceedsBudget(eq.cost) ? 'bg-red-50' : 'bg-surface'">
                <div class="flex-shrink-0 mt-0.5">
                  <span x-show="eq.required" class="inline-flex items-center justify-center w-5 h-5 rounded-full bg-brand-primary text-white text-xs font-bold" aria-label="Required">✓</span>
                  <span x-show="!eq.required" class="inline-flex items-center justify-center w-5 h-5 rounded-full bg-gray-300 text-white text-xs" aria-label="Optional">○</span>
                </div>
                <div class="flex-1 min-w-0">
                  <div class="flex items-center gap-2">
                    <span class="text-sm font-medium text-th-text" :class="exceedsBudget(eq.cost) ? 'line-through text-th-text-secondary' : ''" x-text="eq.item"></span>
                    <span class="text-xs font-medium px-2 py-0.5 rounded-full" :class="exceedsBudget(eq.cost) ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-700'" x-text="'$' + eq.cost"></span>
                  </div>
                  <p class="text-xs text-th-text-secondary mt-0.5" x-show="eq.alternative">
                    Alternative: <span x-text="eq.alternative"></span>
                  </p>
                  <p x-show="exceedsBudget(eq.cost)" class="text-xs text-red-500 mt-0.5">Exceeds your budget — consider the alternative</p>
                </div>
              </div>
            </template>
          </div>
        </div>

        <!-- Week 1 Plan Preview -->
        <div class="bg-surface rounded-xl border border-th-border p-6 mb-6">
          <h2 class="text-lg font-semibold text-th-text mb-4">Week 1 Plan</h2>
          <div class="space-y-2">
            <template x-for="task in (hobby ? hobby.weekOnePlan : [])" :key="task.day">
              <div class="flex items-center gap-3 p-3 rounded-lg bg-surface hover:bg-brand-primary/10 transition-colors group relative">
                <div class="flex-shrink-0 w-8 h-8 rounded-full bg-brand-primary/10 text-brand-primary flex items-center justify-center text-sm font-bold" aria-hidden="true">
                  <span x-text="task.day"></span>
                </div>
                <div class="flex-1 min-w-0">
                  <span class="text-sm font-medium text-th-text" x-text="task.title"></span>
                  <span class="ml-2 text-xs text-th-text-secondary" x-text="task.estimatedTime"></span>
                </div>
                <!-- Tooltip: Why this matters -->
                <div class="relative group/tip">
                  <button class="p-1 rounded-full text-th-text-secondary hover:text-brand-primary hover:bg-brand-primary/10 transition-colors" :aria-label="'Why ' + task.title + ' matters'">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/></svg>
                  </button>
                  <div class="absolute bottom-full right-0 mb-2 hidden group-hover/tip:block z-10">
                    <div class="bg-gray-900 text-white text-xs rounded-lg px-3 py-2 max-w-[220px] shadow-lg" x-text="task.description"></div>
                  </div>
                </div>
              </div>
            </template>
          </div>
        </div>

        <!-- Milestones Timeline -->
        <div class="bg-surface rounded-xl border border-th-border p-6 mb-6">
          <h2 class="text-lg font-semibold text-th-text mb-4">Milestones</h2>
          <div class="flex flex-col sm:flex-row items-start sm:items-center gap-4 sm:gap-0">
            <template x-for="(milestone, idx) in (hobby ? hobby.milestones : [])" :key="idx">
              <div class="flex items-center flex-1">
                <div class="flex flex-col items-center text-center flex-1">
                  <div class="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold text-sm"

  <!-- ─── Toast Notification Component ────────────────────────────────────── -->
  <div x-data="toastStore()" x-on:show-toast.window="add($event.detail)" class="fixed top-4 right-4 z-50 flex flex-col gap-2" aria-live="polite" aria-atomic="true">
    <template x-for="toast in toasts" :key="toast.id">
      <div
        x-show="toast.visible"
        x-transition:enter="transition ease-out duration-300"
        x-transition:enter-start="opacity-0 translate-x-4"
        x-transition:enter-end="opacity-100 translate-x-0"
        x-transition:leave="transition ease-in duration-200"
        x-transition:leave-start="opacity-100 translate-x-0"
        x-transition:leave-end="opacity-0 translate-x-4"
        class="px-4 py-3 rounded-lg shadow-lg text-sm font-medium text-white max-w-xs"
        :class="{
          'bg-green-600': toast.type === 'success',
          'bg-blue-600': toast.type === 'info',
          'bg-amber-600': toast.type === 'warning'
        }"
        role="alert"
      >
        <span x-text="toast.message"></span>
      </div>
    </template>
  </div>

  <!-- ─── Scripts ─────────────────────────────────────────────────────────── -->
  <script src="data.js"></script>
  <script src="engine.js"></script>
  <script src="utils.js"></script>
  <script src="auth.js"></script>
  <script>runAuthCheck(false);</script>
  <script>
    // Toast store for Alpine.js
    function toastStore() {
      return {
        toasts: [],
        add(detail) {
          var id = Date.now();
          var toast = { id: id, message: detail.message, type: detail.type || 'info', visible: true };
          this.toasts.push(toast);
          var self = this;
          setTimeout(function() {
            var t = self.toasts.find(function(t) { return t.id === id; });
            if (t) t.visible = false;
            setTimeout(function() {
              self.toasts = self.toasts.filter(function(t) { return t.id !== id; });
            }, 300);
          }, 3000);
        }
      };
    }

    // Theme Switcher Alpine.js component
    function themeSwitcher() {
      return {
        open: false,
        activeTheme: '',
        themes: [],
        focusedIndex: 0,

        init() {
          this.themes = getValidThemes();
          this.activeTheme = getActiveThemeId();
          this.focusedIndex = this.themes.findIndex(function(t) { return t.id === this.activeTheme; }.bind(this));
          if (this.focusedIndex === -1) this.focusedIndex = 0;
        },

        toggle() {
          this.open = !this.open;
        },

        select(themeId) {
          if (themeId === this.activeTheme) return;
          setTheme(themeId);
          this.activeTheme = themeId;
        },

        handleKeydown(event) {
          var len = this.themes.length;
          if (len === 0) return;

          if (event.key === 'ArrowDown' || event.key === 'ArrowRight') {
            event.preventDefault();
            this.focusedIndex = (this.focusedIndex + 1) % len;
            this.$el.querySelectorAll('[role="radio"]')[this.focusedIndex].focus();
          } else if (event.key === 'ArrowUp' || event.key === 'ArrowLeft') {
            event.preventDefault();
            this.focusedIndex = (this.focusedIndex - 1 + len) % len;
            this.$el.querySelectorAll('[role="radio"]')[this.focusedIndex].focus();
          } else if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            this.select(this.themes[this.focusedIndex].id);
          } else if (event.key === 'Escape') {
            this.close();
          }
        },

        close() {
          this.open = false;
        }
      };
    }

    // Hobby Detail page Alpine.js state
    function hobbyDetailPage() {
      return {
        hobby: null,
        coins: 0,
        savedCount: 0,
        savedHobbies: [],
        profile: null,
        starting: false,

        init() {
          var self = this;

          // Read hobby ID from query parameter
          var params = new URLSearchParams(window.location.search);
          var hobbyId = params.get('id');

          // Redirect if missing or invalid
          if (!hobbyId) {
            window.location.href = 'discovery.html';
            return;
          }

          // Find hobby in catalog
          if (typeof HOBBIES !== 'undefined') {
            for (var i = 0; i < HOBBIES.length; i++) {
              if (HOBBIES[i].id === hobbyId) {
                this.hobby = HOBBIES[i];
                break;
              }
            }
          }

          // Redirect if hobby not found
          if (!this.hobby) {
            showToast('Hobby not found', 'warning');
            window.location.href = 'discovery.html';
            return;
          }

          // Read user state
          this.coins = getFromStorage('coins', 0);
          this.savedHobbies = getFromStorage('savedHobbies', []);
          this.savedCount = this.savedHobbies.length;
          this.profile = getFromStorage('hobbyUserProfile', null);

          // Listen for storage changes
          window.addEventListener('storage', function() {
            self.coins = getFromStorage('coins', 0);
            self.savedHobbies = getFromStorage('savedHobbies', []);
            self.savedCount = self.savedHobbies.length;
          });
        },

        // Get cost label for a hobby
        getCostLabel(hobby) {
          if (hobby.starterCost.min === 0 && hobby.starterCost.max === 0) {
            return 'Free';
          }
          return '$' + hobby.starterCost.min + '–$' + hobby.starterCost.max;
        },

        // Check if an equipment item exceeds user budget
        exceedsBudget(cost) {
          if (!this.profile || !this.profile.budget) return false;
          var budget = this.profile.budget;
          if (budget === 'free' && cost > 0) return true;
          if (budget === '<$50' && cost > 50) return true;
          return false;
        },

        // Check if current hobby is saved
        isSaved() {
          if (!this.hobby) return false;
          return this.savedHobbies.indexOf(this.hobby.id) !== -1;
        },

        // Start this hobby
        startHobby() {
          if (!this.hobby || this.starting) return;
          var self = this;
          this.starting = true;

          // Save hobby ID as activeHobby
          saveToStorage('activeHobby', this.hobby.id);

          // Show confirmation animation for 1 second then navigate
          showToast('Starting ' + this.hobby.name + '!', 'success');
          setTimeout(function() {
            window.location.href = 'my-plan.html';
          }, 1000);
        },

        // Save for later
        saveForLater() {
          if (!this.hobby) return;
          toggleSavedHobby(this.hobby.id);
          this.savedHobbies = getFromStorage('savedHobbies', []);
          this.savedCount = this.savedHobbies.length;
          this.coins = getFromStorage('coins', 0);
        }
      };
    }
  </script>
